server {
    listen 80;
    server_name TU_DOMINIO_AQUI;   # Ej: linkedin-app.vason9.easypanel.host

    # Redirigir HTTP a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name TU_DOMINIO_AQUI;   # Ej: linkedin-app.vason9.easypanel.host

    # SSL — EasyPanel gestiona esto automáticamente con Let's Encrypt
    # ssl_certificate /etc/letsencrypt/live/TU_DOMINIO/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO/privkey.pem;

    # Ruta donde está el frontend
    root /var/www/linkedin-app;
    index index.html;

    # Autenticación básica (contraseña de acceso a la app)
    auth_basic "LinkedIn Content App";
    auth_basic_user_file /etc/nginx/linkedin-app.htpasswd;

    # Servir el SPA (todas las rutas devuelven index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Headers de seguridad básicos
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip para rendimiento
    gzip on;
    gzip_types text/html text/css application/javascript;
}

# ============================================================
# INSTRUCCIONES DE DESPLIEGUE
# ============================================================
#
# 1. Copiar index.html al VPS:
#    mkdir -p /var/www/linkedin-app
#    scp frontend/index.html usuario@VPS:/var/www/linkedin-app/
#
# 2. Crear archivo de contraseña (genera hash bcrypt):
#    htpasswd -c /etc/nginx/linkedin-app.htpasswd admin
#    (introduce la contraseña cuando lo pida)
#
# 3. Copiar config de nginx:
#    cp nginx/linkedin-app.conf /etc/nginx/sites-available/linkedin-app
#    ln -s /etc/nginx/sites-available/linkedin-app /etc/nginx/sites-enabled/
#    nginx -t && systemctl reload nginx
#
# 4. Si usas EasyPanel, crea un servicio "Static" apuntando a /var/www/linkedin-app
#    y EasyPanel gestiona SSL automáticamente.
#
# ALTERNATIVA SIN VPS (para desarrollo/demo local):
#    Abrir frontend/index.html directamente en el navegador.
#    Las llamadas a n8n funcionan si n8n está accesible desde el navegador.
# ============================================================
